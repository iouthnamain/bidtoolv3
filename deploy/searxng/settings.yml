# SearXNG settings for BidTool local/self-hosted product search.
use_default_settings: true

general:
  debug: false
  instance_name: "BidTool Search"

search:
  safe_search: 1
  autocomplete: ""
  formats:
    - html
    - json

server:
  secret_key: "overridden-by-SEARXNG_SECRET"
  limiter: false
  public_instance: false
  image_proxy: true

valkey:
  url: valkey://localhost:6379/0

outgoing:
  request_timeout: 5.0
  max_request_timeout: 15.0
