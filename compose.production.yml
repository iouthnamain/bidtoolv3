name: bidtool-onprem

services:
  caddy:
    image: caddy:2-alpine
    container_name: bidtool-onprem-caddy
    restart: unless-stopped
    environment:
      BIDTOOL_SITE_ADDRESS: "${BIDTOOL_SITE_ADDRESS:-:80}"
    ports:
      - "${BIDTOOL_HTTP_PORT:-13000}:80"
      - "${BIDTOOL_HTTPS_PORT:-13443}:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - bidtool-onprem-caddy-data:/data
      - bidtool-onprem-caddy-config:/config
    depends_on:
      app:
        condition: service_healthy

  app:
    image: "${BIDTOOL_APP_IMAGE:-ghcr.io/iouthnamain/bidtoolv3:latest}"
    container_name: bidtool-onprem-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-bidtool}:${POSTGRES_PASSWORD:-bidtool}@postgres:5432/${POSTGRES_DB:-bidtoolv3}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:13000}"
      BIDWINNER_BASE_URL: "${BIDWINNER_BASE_URL:-https://bidwinner.info}"
      BIDWINNER_TIMEOUT_MS: "${BIDWINNER_TIMEOUT_MS:-15000}"
      PRODUCT_WEB_SEARCH_PROVIDER: "${PRODUCT_WEB_SEARCH_PROVIDER:-auto}"
      SEARXNG_BASE_URL: "${SEARXNG_BASE_URL:-http://searxng:8080}"
      SEARXNG_TIMEOUT_MS: "${SEARXNG_TIMEOUT_MS:-15000}"
      SEARXNG_MAX_RESULTS: "${SEARXNG_MAX_RESULTS:-8}"
      SEARXNG_LANGUAGE: "${SEARXNG_LANGUAGE:-vi-VN}"
      SEARXNG_ENGINES: "${SEARXNG_ENGINES:-}"
      ENABLE_DEMO_SEED: "${ENABLE_DEMO_SEED:-false}"
      BIDTOOL_RUN_MIGRATIONS: "${BIDTOOL_RUN_MIGRATIONS:-true}"
      BIDTOOL_MIGRATION_ATTEMPTS: "${BIDTOOL_MIGRATION_ATTEMPTS:-30}"
      BIDTOOL_MIGRATION_RETRY_MS: "${BIDTOOL_MIGRATION_RETRY_MS:-2000}"
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
      searxng:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: bidtool-onprem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-bidtoolv3}"
      POSTGRES_USER: "${POSTGRES_USER:-bidtool}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-bidtool}"
    volumes:
      - bidtool-onprem-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bidtool} -d ${POSTGRES_DB:-bidtoolv3}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: bidtool-onprem-searxng
    restart: unless-stopped
    environment:
      SEARXNG_BASE_URL: "${SEARXNG_PUBLIC_BASE_URL:-http://searxng:8080/}"
      SEARXNG_SECRET: "${SEARXNG_SECRET:-change-me-for-onprem}"
      SEARXNG_VALKEY_URL: "valkey://searxng-valkey:6379/0"
    volumes:
      - ./deploy/searxng:/etc/searxng:ro
      - bidtool-onprem-searxng-cache:/var/cache/searxng
    depends_on:
      - searxng-valkey

  searxng-valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: bidtool-onprem-searxng-valkey
    restart: unless-stopped
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - bidtool-onprem-searxng-valkey-data:/data

volumes:
  bidtool-onprem-caddy-data:
  bidtool-onprem-caddy-config:
  bidtool-onprem-postgres-data:
  bidtool-onprem-searxng-cache:
  bidtool-onprem-searxng-valkey-data:
