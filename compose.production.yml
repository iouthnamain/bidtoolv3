name: bidtool-onprem

services:
  caddy:
    image: caddy:2-alpine
    container_name: bidtool-onprem-caddy
    restart: unless-stopped
    environment:
      BIDTOOL_SITE_ADDRESS: "${BIDTOOL_SITE_ADDRESS:-:80}"
    ports:
      - "${BIDTOOL_HTTP_PORT:-13000}:80"
      - "${BIDTOOL_HTTPS_PORT:-13443}:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - bidtool-onprem-caddy-data:/data
      - bidtool-onprem-caddy-config:/config
    depends_on:
      app:
        condition: service_healthy

  app:
    image: "${BIDTOOL_APP_IMAGE:-ghcr.io/iouthnamain/bidtoolv3:latest}"
    container_name: bidtool-onprem-app
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-bidtool}:${POSTGRES_PASSWORD:-bidtool}@postgres:5432/${POSTGRES_DB:-bidtoolv3}"
      APP_BASE_URL: "${APP_BASE_URL:-http://localhost:13000}"
      BIDWINNER_BASE_URL: "${BIDWINNER_BASE_URL:-https://bidwinner.info}"
      BIDWINNER_TIMEOUT_MS: "${BIDWINNER_TIMEOUT_MS:-15000}"
      ENABLE_DEMO_SEED: "${ENABLE_DEMO_SEED:-false}"
      BIDTOOL_RUN_MIGRATIONS: "${BIDTOOL_RUN_MIGRATIONS:-true}"
      BIDTOOL_MIGRATION_ATTEMPTS: "${BIDTOOL_MIGRATION_ATTEMPTS:-30}"
      BIDTOOL_MIGRATION_RETRY_MS: "${BIDTOOL_MIGRATION_RETRY_MS:-2000}"
      BIDTOOL_APP_VERSION: "${BIDTOOL_APP_VERSION:-0.1.0}"
      BIDTOOL_BUILD_METADATA: "${BIDTOOL_BUILD_METADATA:-}"
      BIDTOOL_DEPLOYMENT_SURFACE: "${BIDTOOL_DEPLOYMENT_SURFACE:-onprem}"
      BIDTOOL_MANIFEST_URL: "${BIDTOOL_MANIFEST_URL:-}"
      BIDTOOL_MANIFEST_PATH: "${BIDTOOL_MANIFEST_PATH:-}"
      BIDTOOL_GITHUB_REPO: "${BIDTOOL_GITHUB_REPO:-iouthnamain/bidtoolv3}"
      SEARXNG_BASE_URL: "${SEARXNG_BASE_URL:-http://searxng:8080}"
      SEARXNG_API_KEY: "${SEARXNG_API_KEY:-}"
      SEARXNG_ENGINES: "${SEARXNG_ENGINES:-google,bing,duckduckgo}"
      SEARXNG_LANGUAGE: "${SEARXNG_LANGUAGE:-vi-VN}"
      SEARXNG_SAFE_SEARCH: "${SEARXNG_SAFE_SEARCH:-0}"
      SEARXNG_TIME_RANGE: "${SEARXNG_TIME_RANGE:-}"
      SEARXNG_REQUEST_TIMEOUT_MS: "${SEARXNG_REQUEST_TIMEOUT_MS:-12000}"
      SEARXNG_HTML_FALLBACK: "${SEARXNG_HTML_FALLBACK:-true}"
      SEARCH_BOOST_DOMAINS: "${SEARCH_BOOST_DOMAINS:-binhminhplastic.com.vn,hoaphat.com.vn,cadivi-vn.com,viglacera.vn,thibidi.com}"
      SEARCH_PENALTY_DOMAINS: "${SEARCH_PENALTY_DOMAINS:-shopee.vn,lazada.vn,tiki.vn,sendo.vn}"
      SEARCH_BLOCK_DOMAINS: "${SEARCH_BLOCK_DOMAINS:-}"
      SEARCH_ENABLE_SITE_VN_VARIANTS: "${SEARCH_ENABLE_SITE_VN_VARIANTS:-true}"
      SEARCH_ENABLE_NEGATIVE_MARKETPLACE_VARIANTS: "${SEARCH_ENABLE_NEGATIVE_MARKETPLACE_VARIANTS:-true}"
      SEARCH_MATERIAL_JOB_MAX_QUERIES: "${SEARCH_MATERIAL_JOB_MAX_QUERIES:-4}"
      SEARCH_INTERACTIVE_MAX_QUERIES: "${SEARCH_INTERACTIVE_MAX_QUERIES:-6}"
      SEARCH_EXCEL_RESEARCH_MAX_QUERIES: "${SEARCH_EXCEL_RESEARCH_MAX_QUERIES:-6}"
      SEARCH_RESULT_LIMIT_PER_QUERY: "${SEARCH_RESULT_LIMIT_PER_QUERY:-8}"
      SEARCH_AUDIT_RETENTION_DAYS: "${SEARCH_AUDIT_RETENTION_DAYS:-30}"
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'node -e "fetch(''http://127.0.0.1:3000/api/health'').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 5

  searxng:
    image: searxng/searxng:latest
    container_name: bidtool-onprem-searxng
    restart: unless-stopped
    expose:
      - "8080"
    volumes:
      - ./deploy/searxng:/etc/searxng:ro
    environment:
      SEARXNG_BASE_URL: "${SEARXNG_PUBLIC_BASE_URL:-http://searxng:8080/}"
      SEARXNG_SECRET_KEY: "${SEARXNG_SECRET_KEY:-change-me}"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8080/search?q=test&format=json'', timeout=5)"',
        ]
      interval: 30s
      timeout: 10s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: bidtool-onprem-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-bidtoolv3}"
      POSTGRES_USER: "${POSTGRES_USER:-bidtool}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-bidtool}"
    volumes:
      - bidtool-onprem-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-bidtool} -d ${POSTGRES_DB:-bidtoolv3}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  bidtool-onprem-caddy-data:
  bidtool-onprem-caddy-config:
  bidtool-onprem-postgres-data:
