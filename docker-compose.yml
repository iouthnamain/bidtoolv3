services:
  postgres:
    image: postgres:16-alpine
    container_name: bidtoolv3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bidtoolv3
      POSTGRES_USER: bidtool
      POSTGRES_PASSWORD: bidtool
    ports:
      - "${POSTGRES_HOST_PORT:-55432}:5432"
    volumes:
      - bidtoolv3-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidtool -d bidtoolv3"]
      interval: 5s
      timeout: 5s
      retries: 10

  searxng:
    image: searxng/searxng:latest
    container_name: bidtoolv3-searxng
    restart: unless-stopped
    ports:
      - "${SEARXNG_HOST_PORT:-8888}:8080"
    volumes:
      - ./deploy/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: "http://localhost:${SEARXNG_HOST_PORT:-8888}/"
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    logging:
      driver: json-file
      options:
        max-size: "1m"
        max-file: "1"

volumes:
  bidtoolv3-postgres-data:
