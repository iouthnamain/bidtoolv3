services:
  postgres:
    image: postgres:16-alpine
    container_name: bidtoolv3-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bidtoolv3
      POSTGRES_USER: bidtool
      POSTGRES_PASSWORD: bidtool
    ports:
      - "5432:5432"
    volumes:
      - bidtoolv3-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bidtool -d bidtoolv3"]
      interval: 5s
      timeout: 5s
      retries: 10

  searxng:
    image: docker.io/searxng/searxng:latest
    container_name: bidtoolv3-searxng
    restart: unless-stopped
    profiles: ["search"]
    ports:
      - "8080:8080"
    environment:
      SEARXNG_BASE_URL: "${SEARXNG_PUBLIC_BASE_URL:-http://localhost:8080/}"
      SEARXNG_SECRET: "${SEARXNG_SECRET:-change-me-for-local-dev}"
      SEARXNG_VALKEY_URL: "valkey://searxng-valkey:6379/0"
    volumes:
      - ./deploy/searxng:/etc/searxng:ro
      - bidtoolv3-searxng-cache:/var/cache/searxng
    depends_on:
      - searxng-valkey

  searxng-valkey:
    image: docker.io/valkey/valkey:9-alpine
    container_name: bidtoolv3-searxng-valkey
    restart: unless-stopped
    profiles: ["search"]
    command: valkey-server --save 30 1 --loglevel warning
    volumes:
      - bidtoolv3-searxng-valkey-data:/data

volumes:
  bidtoolv3-postgres-data:
  bidtoolv3-searxng-cache:
  bidtoolv3-searxng-valkey-data:
