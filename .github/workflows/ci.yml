name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
      SKIP_ENV_VALIDATION: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build
        run: bun run build

  release-scripts:
    name: Validate Release Scripts
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate pins registry
        run: bun -e "import { parseReleasePins } from './src/lib/release-manifest.ts'; parseReleasePins(JSON.parse(await Bun.file('releases/pins.json').text()));"

      - name: Validate manifest generation
        run: |
          set -euo pipefail
          mkdir -p dist-release
          cat > dist-release/manifest-input.json <<'EOF'
          {
            "version": "0.0.0-ci",
            "commitSha": "0000000",
            "changelog": "CI fixture",
            "web": {
              "buildId": "dpl_ci",
              "deploymentUrl": "https://example.com",
              "buildMetadata": "0.0.0-ci+web.0000000"
            },
            "onprem": {
              "image": "ghcr.io/example/bidtoolv3:0.0.0-ci",
              "digest": "sha256:deadbeef",
              "buildMetadata": "0.0.0-ci+onprem.0000000"
            },
            "desktop": {
              "linux": {
                "url": "https://example.com/app.AppImage",
                "version": "0.0.0-ci+desktop.linux.0000000"
              }
            }
          }
          EOF
          bun run ./scripts/generate-release-manifest.ts \
            --input dist-release/manifest-input.json \
            --output dist-release/manifest.json

      - name: Validate release CLI status command
        run: bun run ./scripts/release-cli.ts status

  onprem:
    name: On-Prem Package
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - name: Validate production compose
        run: docker compose --env-file deploy/onprem/.env.customer.example -f compose.production.yml config

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build production image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: bidtoolv3:onprem-ci
          build-args: |
            BIDTOOL_APP_VERSION=0.0.0-ci
            BIDTOOL_BUILD_METADATA=0.0.0-ci+onprem.ci
            BIDTOOL_DEPLOYMENT_SURFACE=onprem
