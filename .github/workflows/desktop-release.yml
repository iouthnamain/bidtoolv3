name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
      SKIP_ENV_VALIDATION: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check
        run: bun run check

      - name: Test
        run: bun run test

  docker:
    name: Publish On-Prem Image
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        env:
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG_INPUT}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "Release tag '$tag' must look like v0.1.0." >&2
            exit 1
          fi
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "VERSION=${tag#v}" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.VERSION }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  onprem-bundle:
    name: Build On-Prem Bundle
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        env:
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG_INPUT}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "Release tag '$tag' must look like v0.1.0." >&2
            exit 1
          fi
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"
          echo "VERSION=${tag#v}" >> "$GITHUB_ENV"

      - name: Build bundle
        run: sh scripts/onprem-package-release.sh "$VERSION"

      - name: Upload on-prem bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: bidtoolv3-onprem
          path: dist-onprem/*.tar.gz
          if-no-files-found: error

  desktop-windows:
    name: Build Windows Desktop
    runs-on: windows-latest
    needs: quality
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
      SKIP_ENV_VALIDATION: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release version
        shell: pwsh
        env:
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          $ErrorActionPreference = "Stop"
          $tag = $env:RELEASE_TAG_INPUT
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "Release tag is empty."
          }
          if ($tag -notmatch '^v(?<version>\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)$') {
            throw "Release tag '$tag' must look like v0.1.0."
          }

          "BIDTOOL_DESKTOP_VERSION=$($Matches.version)" >> $env:GITHUB_ENV

      - name: Build Windows desktop app
        run: bun run desktop:build

      - name: Upload Windows desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: bidtoolv3-windows
          path: |
            dist-electron/*.exe
            dist-electron/*.blockmap
            dist-electron/latest.yml
          if-no-files-found: error

  desktop-linux:
    name: Build Linux Desktop
    runs-on: ubuntu-latest
    needs: quality
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      DATABASE_URL: postgres://placeholder:placeholder@localhost:5432/placeholder
      SKIP_ENV_VALIDATION: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve release version
        env:
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG_INPUT}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "Release tag '$tag' must look like v0.1.0." >&2
            exit 1
          fi
          echo "BIDTOOL_DESKTOP_VERSION=${tag#v}" >> "$GITHUB_ENV"

      - name: Build Linux desktop app
        run: bun run desktop:build

      - name: Upload Linux desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: bidtoolv3-linux
          path: |
            dist-electron/*.AppImage
            dist-electron/*.blockmap
            dist-electron/latest-linux.yml
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - docker
      - onprem-bundle
      - desktop-windows
      - desktop-linux
    steps:
      - name: Resolve release tag
        env:
          RELEASE_TAG_INPUT: ${{ github.event.inputs.release_tag || github.ref_name }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG_INPUT}"
          if ! printf '%s' "$tag" | grep -Eq '^v[0-9]+\.[0-9]+\.[0-9]+([-+][0-9A-Za-z.-]+)?$'; then
            echo "Release tag '$tag' must look like v0.1.0." >&2
            exit 1
          fi
          echo "RELEASE_TAG=$tag" >> "$GITHUB_ENV"

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mapfile -t assets < <(find release-assets -type f | sort)
          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found." >&2
            exit 1
          fi

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" \
              --title "BidTool v3 $RELEASE_TAG" \
              --generate-notes \
              --target "$GITHUB_SHA"
          fi
